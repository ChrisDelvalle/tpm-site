name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  astro:
    name: Astro build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: bun run build
      - run: bun run verify
